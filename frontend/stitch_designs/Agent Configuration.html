<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Agent Config - AIworkfor.me</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col pb-24">
<!-- Top Bar -->
<header class="sticky top-0 z-10 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 justify-between border-b border-slate-200 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors cursor-pointer" data-icon="ArrowLeft">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Agent Config</h2>
</header>
<main class="flex flex-col gap-6 p-4 max-w-md mx-auto w-full">
<!-- Avatar Upload Section -->
<section class="flex flex-col items-center py-6">
<div class="relative group cursor-pointer">
<div class="bg-slate-200 dark:bg-slate-800 aspect-square rounded-full h-32 w-32 flex items-center justify-center border-4 border-white dark:border-slate-900 shadow-sm overflow-hidden bg-cover bg-center" data-alt="Modern AI agent abstract avatar graphic" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA5Z022z-6U4dqrSFj5QU3CTaTzjzqmADMLa-Cwj-80Wg0JMlMSv-FLyoKnUfwpacHzNd9PhINpnjPnyATYh7IldRraZcrKB3o9TO08SF4uG6wb_Q0Ricd3gkf3SVB3h_hwO-TkcFnxU2KOHppoKUEmBkvbmf-g7TKjS10AGtMdW7Y5NloXw1eEOLKJ8TRiS2AYIlLGTzSPBxfxsks6qJBoqaZb9JX9STMkSs0-04KJEeND_326Fzf7NSjFPQGrFlcYBRHnv7uA2g");'>
</div>
<div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white text-3xl">photo_camera</span>
</div>
</div>
<div class="mt-4 text-center">
<p class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">Upload Avatar</p>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">PNG or JPG up to 5MB</p>
</div>
</section>
<!-- Inputs -->
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold px-1">Agent Name</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 h-14 px-4 focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-400" placeholder="e.g. Personal Assistant" type="text" value="Jasper AI"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold px-1">System Instructions</label>
<textarea class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-[160px] p-4 focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-400 resize-none" placeholder="Describe how the agent should behave...">You are a helpful, professional assistant. Your primary goal is to help organize my schedule and manage digital assets. Be concise and proactive.</textarea>
</div>
</div>
<!-- Skills List -->
<section class="space-y-4">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold px-1 pt-2">Skills</h3>
<div class="bg-white dark:bg-slate-900 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Skill Item 1 -->
<div class="flex items-center justify-between p-4 border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">calendar_month</span>
</div>
<span class="font-medium text-slate-800 dark:text-slate-200">Access Calendar</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<!-- Skill Item 2 -->
<div class="flex items-center justify-between p-4 border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">image</span>
</div>
<span class="font-medium text-slate-800 dark:text-slate-200">Send Images</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<!-- Skill Item 3 -->
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">mail</span>
</div>
<span class="font-medium text-slate-800 dark:text-slate-200">Manage Emails</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
</section>
</main>
<!-- Sticky Footer -->
<footer class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-slate-200 dark:border-slate-800">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-xl shadow-lg shadow-primary/25 flex items-center justify-center transition-transform active:scale-[0.98]">
                    Save Changes
                </button>
</div>
</footer>
</div>
</body></html>
